services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ~/localLLM/df:/df
      - ~/localLLM/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ollama

  claude:
    image: node:22-slim
    container_name: claude
    restart: unless-stopped
    depends_on:
      - ollama
    volumes:
      - ~/localLLM/df:/df
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: bash -c "npm install -g @anthropic-ai/claude-code && sleep infinity"
    networks:
      - ollama

networks:
  ollama:
    name: ollama
