services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ~/localLLM/df:/df
      - ~/localLLM/ollama:/root/.ollama
    entrypoint: >
      bash -c "
        /bin/ollama serve &
        sleep 5 &&
        ollama pull qwen3-coder:30b &&
        wait
      "
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ollama

  claude:
    image: node:22-slim
    container_name: claude
    restart: unless-stopped
    depends_on:
      - ollama
    volumes:
      - ~/localLLM/df:/df
      - claude-home:/root
    environment:
      - ANTHROPIC_BASE_URL=http://ollama:11434
      - ANTHROPIC_AUTH_TOKEN=ollama
      - ANTHROPIC_API_KEY=ollama
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
    command: >
      bash -c "
        npm install -g @anthropic-ai/claude-code &&
        mkdir -p /root/.claude &&
        cat > /root/.claude/settings.json <<'SETTINGS'
      {
        \"model\": \"qwen3-coder:30b\",
        \"env\": {
          \"ANTHROPIC_BASE_URL\": \"http://ollama:11434\",
          \"ANTHROPIC_AUTH_TOKEN\": \"ollama\"
        }
      }
      SETTINGS
        sleep infinity
      "
    networks:
      - ollama

volumes:
  claude-home:

networks:
  ollama:
    name: ollama
