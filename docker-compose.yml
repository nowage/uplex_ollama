services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_FLASH_ATTENTION=0
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "11436:11434"
    volumes:
      - ~/localLLM/df:/df
      - ~/localLLM/ollama_docker:/root/.ollama
    entrypoint: >
      bash -c "
        /bin/ollama serve &
        sleep 5 &&
        ollama pull qwen3-coder:30b &&
        wait
      "
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ollama

  claude:
    image: claude
    build:
      context: .
      dockerfile: Dockerfile.claude
    container_name: claude
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ~/localLLM/df:/home/uplexsoft/df
      - claude-home:/home/uplexsoft
    environment:
      - ANTHROPIC_BASE_URL=http://ollama:11434
      - ANTHROPIC_AUTH_TOKEN=ollama
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
    networks:
      - ollama

volumes:
  claude-home:

networks:
  ollama:
    name: ollama
